name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux
          - os: macos-latest
            suffix: macos
          - os: windows-latest
            suffix: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
            libflac-dev libvorbis-dev libgl1-mesa-dev libegl1-mesa-dev \
            libfreetype-dev libharfbuzz-dev libmbedtls-dev libssh2-1-dev

      - name: Setup MSYS2 (Windows server build only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            gcc
            make
            zip

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: client/build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('client/CMakeLists.txt') }}

      - name: Configure client
        run: cmake -S client -B client/build -DCMAKE_BUILD_TYPE=Release

      - name: Build client
        run: cmake --build client/build --config Release

      - name: Build server (Unix)
        if: runner.os != 'Windows'
        run: |
          cd server
          make clean
          make CFLAGS="-Wall -Wextra -O2 -std=c11 -D_POSIX_C_SOURCE=200809L -D_GNU_SOURCE"

      - name: Build server (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd server
          make clean
          make CC=/usr/bin/gcc CFLAGS="-Wall -Wextra -O2 -std=c11 -D_POSIX_C_SOURCE=200809L -D_GNU_SOURCE"

      - name: Package client
        shell: bash
        run: |
          mkdir -p dist/client/maps
          if [ "${{ runner.os }}" == "Windows" ]; then
            # Visual Studio multi-config places binary in Release/
            if [ -f client/build/Release/client.exe ]; then
              cp client/build/Release/client.exe dist/client/
            else
              cp client/build/client.exe dist/client/
            fi
          else
            cp client/build/client dist/client/
          fi
          cp -r client/assets dist/client/
          cp client/config.ini dist/client/

          # Bundle shared libraries from FetchContent build tree
          if [ "${{ runner.os }}" == "Linux" ]; then
            mkdir -p dist/client/lib
            cp client/build/_deps/sfml-build/lib/libsfml-*.so* dist/client/lib/ 2>/dev/null || true
            cp client/build/_deps/csfml-build/lib/libcsfml-*.so* dist/client/lib/ 2>/dev/null || true
          elif [ "${{ runner.os }}" == "macOS" ]; then
            mkdir -p dist/client/lib
            cp client/build/_deps/sfml-build/lib/libsfml-*.dylib dist/client/lib/ 2>/dev/null || true
            cp client/build/_deps/csfml-build/lib/libcsfml-*.dylib dist/client/lib/ 2>/dev/null || true
          elif [ "${{ runner.os }}" == "Windows" ]; then
            # Copy all DLLs found in the build tree
            find client/build -name "*.dll" -exec cp {} dist/client/ \; 2>/dev/null || true
          fi

          touch dist/client/maps/.gitkeep
          cd dist
          zip -r elysium-client-${{ matrix.suffix }}.zip client/

      - name: Package server
        shell: bash
        run: |
          mkdir -p dist/server/maps dist/server/accounts
          if [ "${{ runner.os }}" == "Windows" ]; then
            cp server/server.exe dist/server/
          else
            cp server/server dist/server/
          fi
          cp server/*.ini dist/server/
          cp -r server/maps/* dist/server/maps/ 2>/dev/null || true
          cp -r server/accounts/* dist/server/accounts/ 2>/dev/null || true
          cd dist
          zip -r elysium-server-${{ matrix.suffix }}.zip server/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.suffix }}
          path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
