name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxrandr-dev libxcursor-dev libxi-dev libudev-dev \
            libflac-dev libvorbis-dev libgl1-mesa-dev libegl1-mesa-dev \
            libfreetype-dev libharfbuzz-dev libmbedtls-dev libssh2-1-dev

      - name: Setup MSYS2 (Windows server build only)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: >-
            gcc
            make

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: client/build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('client/CMakeLists.txt') }}

      - name: Configure client
        run: cmake -S client -B client/build -DCMAKE_BUILD_TYPE=Release

      - name: Build client
        run: cmake --build client/build --config Release

      - name: Build server (Unix)
        if: runner.os != 'Windows'
        run: |
          cd server
          make clean
          make

      - name: Build server (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd server
          make clean
          make CC=/usr/bin/gcc

      - name: Smoke test server (Unix)
        if: runner.os != 'Windows'
        run: |
          cd server
          ./server &
          PID=$!
          sleep 2
          if kill -0 $PID 2>/dev/null; then
            echo "Server started successfully"
            kill $PID 2>/dev/null || true
            sleep 1
            kill -9 $PID 2>/dev/null || true
          else
            echo "Server failed to start"
            exit 1
          fi

      - name: Smoke test server (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          cd server
          ./server &
          PID=$!
          sleep 3
          if kill -0 $PID 2>/dev/null; then
            echo "Server started successfully"
            kill $PID 2>/dev/null || true
            sleep 1
            kill -9 $PID 2>/dev/null || true
          else
            echo "Server failed to start"
            exit 1
          fi
